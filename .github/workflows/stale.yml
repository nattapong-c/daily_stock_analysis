# 自动关闭过期的 Issues 和 PR
# 每天检查一次，标记长时间无响应的 issues/PRs

name: Stale Issues & PRs

on:
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）检查一次
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: 🧹 Cleanup Stale Issues/PRs
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏷️ Mark and Close Stale Issues/PRs
        uses: actions/stale@v10
        with:
          # ===== Issue 配置 =====
          days-before-issue-stale: 7
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            👋 This issue has been marked as stale because it has been inactive for 7 days.
            
            If the problem still exists, please comment to keep it active; otherwise, it will be closed automatically in 7 days.
            If it is no longer needed, feel free to close it yourself.
          close-issue-message: |
            🔒 This issue has been automatically closed because it has been inactive for another 7 days.
            
            If the issue is still relevant, please reopen it or create a new one.
          
          # ===== PR 配置 =====
          days-before-pr-stale: 21
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            👋 This PR has been marked as stale because it has been inactive for 21 days.
            
            Please check if you need to:
            - Resolve merge conflicts
            - Address review comments
            - Push updates to the branch
            
            **If there is no activity in the next 14 days, this PR will be closed automatically.**
          close-pr-message: |
            🔒 This PR has been automatically closed because it has been inactive for another 14 days.
            
            If you still wish to submit these changes, feel free to reopen or create a new PR.
          
          # ===== 排除规则 =====
          # 带有这些标签的不会被标记为 stale
          exempt-issue-labels: 'pinned,security,enhancement,help wanted,good first issue'
          exempt-pr-labels: 'pinned,security,work-in-progress,wip'
          
          # 排除草稿 PR
          exempt-draft-pr: true
          
          # ===== 其他配置 =====
          # 每次运行最多处理的数量
          operations-per-run: 50
          
          # 只处理这些状态的
          only-labels: ''
          
          # 移除 stale 标签（当有新活动时）
          remove-stale-when-updated: true
          
          # 调试模式（设为 true 时只打印不实际操作）
          debug-only: false
